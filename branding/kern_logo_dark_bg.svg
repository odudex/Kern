<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Kern Logo on dark background (as seen on device) -->

  <!-- Dark background -->
  <rect width="200" height="200" rx="16" fill="#1a1a1a"/>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="88.5" fill="none" stroke="#ff6600" stroke-width="2.5"/>

  <!-- Inner ring (63% diameter) -->
